services:
  gateway:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
      # Kept private to the VPS so the existing host Nginx can proxy /api/v1.
      - "127.0.0.1:8000:8000"
    environment:
      APP_NAME: Ollama Gateway
      ENVIRONMENT: production
      DEBUG: "false"
      API_V1_PREFIX: /api/v1
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      DATABASE_URL: postgresql+asyncpg://ollama:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/ollama_gateway
      REDIS_URL: redis://redis:6379/0
      # Private address of Ollama on the user's PC, reachable through Tailscale.
      # Never expose Ollama port 11434 publicly.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:?Set OLLAMA_BASE_URL to your PC's private Ollama URL}
      OLLAMA_TIMEOUT_SECONDS: "180"
      OLLAMA_MAX_CONCURRENT_GENERATIONS: "1"
      OLLAMA_QUEUE_WAIT_SECONDS: "15"
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
      RATE_LIMIT_PER_MINUTE: "30"
      MAX_PROMPT_CHARS: "20000"
      LOG_LEVEL: INFO
      RAG_ENABLED: "true"
      RAG_EMBEDDING_MODEL: nomic-embed-text
      RAG_EMBEDDING_DIMENSIONS: "768"
      RAG_TOP_K: "4"
      RAG_CHUNK_SIZE: "1200"
      RAG_CHUNK_OVERLAP: "200"
      RAG_MAX_UPLOAD_BYTES: "10485760"
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ollama_gateway
      POSTGRES_USER: ollama
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollama -d ollama_gateway"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  redis_data:
